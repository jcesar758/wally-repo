<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏆 Retos y Campeonatos Amix - Wally</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 0;
    }
    header {
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      padding: 15px;
      text-align: center;
    }
    .container { max-width: 1100px; margin: 15px auto; padding: 15px; }
    .card {
      background: #1e2937;
      border-radius: 12px;
      padding: 20px;
      margin: 15px 0;
    }
    button {
      padding: 12px 18px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-success { background: #22c55e; color: white; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-small { padding: 8px 12px; font-size: 14px; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1e2937;
    }
    th, td {
      padding: 12px;
      text-align: center;
      border: 1px solid #334155;
    }
    th { background: #1e40af; }
    input[type="number"] { width: 70px; padding: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>🏆 Retos y Campeonatos Amix</h1>
    <h2>Wally Edition</h2>
  </header>

  <div class="container">
    <div id="menu" class="card">
      <h2>Menú Principal</h2>
      <button class="btn-primary" onclick="mostrarCrearTorneo()">➕ Nuevo Torneo</button><br>
      <button class="btn-primary" onclick="cargarTorneoGuardado()">📂 Cargar Torneo Guardado</button><br>
      <button onclick="exportarTorneo()" class="btn-primary">📤 Exportar Torneo</button>
      <button onclick="reiniciarTodo()" class="btn-danger">🗑️ Reiniciar Todo</button>
    </div>

    <!-- Crear Torneo -->
    <div id="crearTorneo" class="card" style="display:none;">
      <h2>🏆 Nuevo Torneo de Wally</h2>
      <input type="text" id="nombreTorneo" placeholder="Nombre del Torneo (ej: Liga Wally Amix)" style="width:100%; padding:12px; margin:10px 0;">
      <input type="number" id="numEquipos" value="5" min="2" max="16" style="width:100%; padding:12px;">
      <button class="btn-success" onclick="crearTorneo()">Crear y Agregar Equipos</button>
      <button onclick="volverMenu()" class="btn-danger">Cancelar</button>
    </div>

    <!-- Gestión de Equipos -->
    <div id="gestionEquipos" class="card" style="display:none;">
      <h2>Equipos</h2>
      <div id="listaEquipos"></div>
      <input type="text" id="nuevoEquipo" placeholder="Nombre del equipo">
      <button onclick="agregarEquipo()">+ Agregar</button>
      <button onclick="generarFixture()" class="btn-success">✅ Generar Fixture Ida y Vuelta</button>
    </div>

    <!-- Fixture -->
    <div id="fixture" class="card" style="display:none;">
      <h2>Fixture - Ida y Vuelta</h2>
      <button onclick="mostrarTablaPosiciones()" class="btn-primary">Ver Tabla de Posiciones</button>
      <div id="listaPartidos"></div>
    </div>

    <!-- Tabla de Posiciones -->
    <div id="tablaPosiciones" class="card" style="display:none;">
      <h2>🏅 Tabla de Posiciones</h2>
      <button onclick="volverAFixture()" class="btn-primary">Volver al Fixture</button>
      <table id="tablaPos">
        <thead>
          <tr>
            <th>Pos</th>
            <th>Equipo</th>
            <th>PJ</th>
            <th>PG</th>
            <th>PP</th>
            <th>PF</th>
            <th>PC</th>
            <th>Dif</th>
            <th>Puntos</th>
          </tr>
        </thead>
        <tbody id="bodyTabla"></tbody>
      </table>
    </div>
  </div>

  <script>
    let torneo = { nombre: "", equipos: [], partidos: [] };

    // Cargar torneo guardado al abrir
    window.onload = function() {
      const guardado = localStorage.getItem('torneoWallyAmix');
      if (guardado) {
        torneo = JSON.parse(guardado);
        mostrarMenuPrincipal();
      }
    };

    function guardarAutomatico() {
      localStorage.setItem('torneoWallyAmix', JSON.stringify(torneo));
    }

    function mostrarCrearTorneo() {
      document.getElementById('menu').style.display = 'none';
      document.getElementById('crearTorneo').style.display = 'block';
    }

    function volverMenu() {
      document.getElementById('menu').style.display = 'block';
      ocultarTodasLasPantallas();
    }

    function ocultarTodasLasPantallas() {
      document.getElementById('crearTorneo').style.display = 'none';
      document.getElementById('gestionEquipos').style.display = 'none';
      document.getElementById('fixture').style.display = 'none';
      document.getElementById('tablaPosiciones').style.display = 'none';
    }

    function crearTorneo() {
      const nombre = document.getElementById('nombreTorneo').value.trim();
      if (!nombre) return alert("Escribe el nombre del torneo");

      torneo = {
        nombre: nombre,
        equipos: [],
        partidos: []
      };

      ocultarTodasLasPantallas();
      document.getElementById('gestionEquipos').style.display = 'block';
      actualizarListaEquipos();
      guardarAutomatico();
    }

    function agregarEquipo() {
      const input = document.getElementById('nuevoEquipo');
      if (input.value.trim() === "") return;

      torneo.equipos.push({
        nombre: input.value.trim(),
        pj: 0, pg: 0, pp: 0, pf: 0, pc: 0, puntos: 0
      });

      input.value = "";
      actualizarListaEquipos();
      guardarAutomatico();
    }

    function actualizarListaEquipos() {
      let html = `<p><strong>${torneo.equipos.length} equipos</strong></p><ul>`;
      torneo.equipos.forEach((eq, i) => {
        html += `<li>${eq.nombre} <button class="btn-danger btn-small" onclick="eliminarEquipo(${i})">Eliminar</button></li>`;
      });
      html += "</ul>";
      document.getElementById('listaEquipos').innerHTML = html;
    }

    function eliminarEquipo(i) {
      torneo.equipos.splice(i, 1);
      actualizarListaEquipos();
      guardarAutomatico();
    }

    function generarFixture() {
      if (torneo.equipos.length < 2) return alert("Mínimo 2 equipos");

      torneo.partidos = [];
      const eq = torneo.equipos;

      for (let i = 0; i < eq.length; i++) {
        for (let j = i + 1; j < eq.length; j++) {
          torneo.partidos.push({ local: eq[i].nombre, visitante: eq[j].nombre, resultado: null });
          torneo.partidos.push({ local: eq[j].nombre, visitante: eq[i].nombre, resultado: null });
        }
      }

      ocultarTodasLasPantallas();
      document.getElementById('fixture').style.display = 'block';
      mostrarPartidos();
      guardarAutomatico();
    }

    function mostrarPartidos() {
      let html = "";
      torneo.partidos.forEach((p, i) => {
        if (p.resultado) {
          html += `<div class="card">${p.local} <b>${p.resultado.local} - ${p.resultado.visitante}</b> ${p.visitante} 
                   <button onclick="editarResultado(${i})" class="btn-small">Editar</button></div>`;
        } else {
          html += `
            <div class="card">
              <strong>${p.local}</strong> vs <strong>${p.visitante}</strong><br>
              <input type="number" id="resL${i}" placeholder="15" min="0"> -
              <input type="number" id="resV${i}" placeholder="13" min="0">
              <button onclick="registrarResultado(${i})" class="btn-success">Guardar</button>
            </div>`;
        }
      });
      document.getElementById('listaPartidos').innerHTML = html;
    }

    function registrarResultado(i) {
      const local = parseInt(document.getElementById(`resL${i}`).value);
      const visit = parseInt(document.getElementById(`resV${i}`).value);

      if (isNaN(local) || isNaN(visit)) return alert("Ingresa ambos marcadores");

      if (Math.abs(local - visit) < 2 || (local < 15 && visit < 15)) {
        return alert("Debe ganar por 2 puntos y llegar mínimo a 15");
      }

      torneo.partidos[i].resultado = { local: local, visitante: visit };
      actualizarEstadisticas();
      mostrarPartidos();
      guardarAutomatico();
    }

    function editarResultado(i) {
      torneo.partidos[i].resultado = null;
      mostrarPartidos();
    }

    function actualizarEstadisticas() {
      torneo.equipos.forEach(e => { e.pj = 0; e.pg = 0; e.pp = 0; e.pf = 0; e.pc = 0; e.puntos = 0; });

      torneo.partidos.forEach(p => {
        if (!p.resultado) return;
        const localTeam = torneo.equipos.find(e => e.nombre === p.local);
        const visitTeam = torneo.equipos.find(e => e.nombre === p.visitante);

        localTeam.pj++; visitTeam.pj++;
        localTeam.pf += p.resultado.local; localTeam.pc += p.resultado.visitante;
        visitTeam.pf += p.resultado.visitante; visitTeam.pc += p.resultado.local;

        if (p.resultado.local > p.resultado.visitante) {
          localTeam.pg++; localTeam.puntos += 3;
          visitTeam.pp++;
        } else {
          visitTeam.pg++; visitTeam.puntos += 3;
          localTeam.pp++;
        }
      });

      torneo.equipos.sort((a,b) => b.puntos - a.puntos || (b.pf-b.pc) - (a.pf-a.pc));
    }

    function mostrarTablaPosiciones() {
      actualizarEstadisticas();
      ocultarTodasLasPantallas();
      document.getElementById('tablaPosiciones').style.display = 'block';

      let html = "";
      torneo.equipos.forEach((eq, i) => {
        html += `<tr>
          <td>${i+1}</td>
          <td>${eq.nombre}</td>
          <td>${eq.pj}</td>
          <td>${eq.pg}</td>
          <td>${eq.pp}</td>
          <td>${eq.pf}</td>
          <td>${eq.pc}</td>
          <td>${eq.pf - eq.pc}</td>
          <td><strong>${eq.puntos}</strong></td>
        </tr>`;
      });
      document.getElementById('bodyTabla').innerHTML = html;
    }

    function volverAFixture() {
      ocultarTodasLasPantallas();
      document.getElementById('fixture').style.display = 'block';
      mostrarPartidos();
    }

    function exportarTorneo() {
      const dataStr = JSON.stringify(torneo, null, 2);
      const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
      const exportFileDefaultName = torneo.nombre ? torneo.nombre + '.json' : 'torneo_wally.json';

      const linkElement = document.createElement('a');
      linkElement.setAttribute('href', dataUri);
      linkElement.setAttribute('download', exportFileDefaultName);
      linkElement.click();
    }

    function cargarTorneoGuardado() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(ev) {
          torneo = JSON.parse(ev.target.result);
          ocultarTodasLasPantallas();
          document.getElementById('fixture').style.display = 'block';
          mostrarPartidos();
          guardarAutomatico();
        };
        reader.readAsText(file);
      };
      input.click();
    }

    function reiniciarTodo() {
      if (confirm("¿Borrar todo el torneo?")) {
        localStorage.removeItem('torneoWallyAmix');
        location.reload();
      }
    }

    function mostrarMenuPrincipal() {
      ocultarTodasLasPantallas();
      document.getElementById('menu').style.display = 'block';
    }
  </script>
</body>
</html>
