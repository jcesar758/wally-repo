<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏆 Retos y Campeonatos Amix - Wally</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e2937);
      color: #e2e8f0;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      padding: 25px;
      text-align: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    }
    header h1 { font-size: 2.4em; margin-bottom: 8px; }
    header h2 { color: #fbbf24; font-size: 1.4em; }

    .container { max-width: 1100px; margin: 20px auto; padding: 0 15px; }
    .card {
      background: rgba(30, 41, 59, 0.95);
      border-radius: 16px;
      padding: 25px;
      margin: 15px 0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      border: 1px solid rgba(59, 130, 246, 0.3);
    }
    button {
      padding: 14px 20px;
      margin: 6px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-success { background: #22c55e; color: white; }
    .btn-danger { background: #ef4444; color: white; }

    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { padding: 14px; text-align: center; border-bottom: 1px solid #475569; }
    th { background: #1e40af; }
    input[type="text"], input[type="number"] {
      padding: 12px;
      border-radius: 8px;
      border: 2px solid #475569;
      background: #1e2937;
      color: white;
      width: 100%;
      margin: 8px 0;
    }
    .partido-card {
      background: #1e2937;
      padding: 18px;
      margin: 12px 0;
      border-radius: 12px;
      border: 2px solid rgba(59, 130, 246, 0.4);
    }
    .jornada {
      background: #1e40af;
      padding: 10px;
      margin: 15px 0 10px 0;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1>🏆 Retos y Campeonatos Amix</h1>
    <h2>Wally Edition</h2>
  </header>

  <div class="container">
    <div id="menu" class="card">
      <h2>Menú Principal</h2>
      <button class="btn-primary" onclick="mostrarCrearTorneo()">➕ Nuevo Torneo</button><br><br>
      <button class="btn-primary" onclick="mostrarCargarTorneo()">📂 Cargar Torneo</button><br><br>
      <button onclick="exportarTorneo()" class="btn-primary">📤 Exportar</button>
      <button onclick="reiniciarTodo()" class="btn-danger">🗑️ Reiniciar</button>
    </div>

    <div id="crearTorneo" class="card" style="display:none;">
      <h2>🏆 Nuevo Torneo de Wally</h2>
      <input type="text" id="nombreTorneo" placeholder="Nombre del Torneo">
      <input type="number" id="numEquipos" value="5" min="2" max="16" placeholder="Número de equipos">
      <button class="btn-success" onclick="crearTorneo()" style="width:100%;">Crear Torneo</button>
      <button onclick="volverMenu()" class="btn-danger" style="width:100%;">Cancelar</button>
    </div>

    <div id="gestionEquipos" class="card" style="display:none;">
      <h2>Equipos</h2>
      <div id="listaEquipos"></div>
      <input type="text" id="nuevoEquipo" placeholder="Nombre del equipo">
      <button onclick="agregarEquipo()" class="btn-primary">+ Agregar</button>
      <button onclick="generarFixture()" class="btn-success" style="width:100%; margin-top:15px;">✅ Generar Fixture (Máx 1 consecutivo)</button>
    </div>

    <div id="fixture" class="card" style="display:none;">
      <h2>📋 Fixture</h2>
      <button onclick="mostrarTablaPosiciones()" class="btn-primary">Ver Tabla de Posiciones</button>
      <div id="listaPartidos"></div>
    </div>

    <div id="tablaPosiciones" class="card" style="display:none;">
      <h2>🏅 Tabla de Posiciones</h2>
      <button onclick="volverAFixture()" class="btn-primary">Volver al Fixture</button>
      <table id="tablaPos">
        <thead>
          <tr>
            <th>Pos</th><th>Equipo</th><th>PJ</th><th>PG</th><th>PP</th><th>PF</th><th>PC</th><th>Dif</th><th>Puntos</th>
          </tr>
        </thead>
        <tbody id="bodyTabla"></tbody>
      </table>
    </div>
  </div>

  <script>
    let torneo = { nombre: "", equipos: [], partidos: [] };

    window.onload = () => {
      const saved = localStorage.getItem('torneoWally');
      if (saved) torneo = JSON.parse(saved);
    };

    function guardar() {
      localStorage.setItem('torneoWally', JSON.stringify(torneo));
    }

    function ocultarTodas() {
      document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
    }

    function mostrarCrearTorneo() {
      ocultarTodas();
      document.getElementById('crearTorneo').style.display = 'block';
    }

    function volverMenu() {
      ocultarTodas();
      document.getElementById('menu').style.display = 'block';
    }

    function crearTorneo() {
      const nombre = document.getElementById('nombreTorneo').value.trim();
      const num = parseInt(document.getElementById('numEquipos').value);

      if (!nombre || isNaN(num) || num < 2 || num > 16) {
        alert("❌ Datos inválidos");
        return;
      }

      torneo = { nombre, equipos: [], partidos: [] };
      for (let i = 0; i < num; i++) {
        torneo.equipos.push({nombre: `Equipo ${i+1}`, pj:0, pg:0, pp:0, pf:0, pc:0, puntos:0});
      }

      guardar();
      ocultarTodas();
      document.getElementById('gestionEquipos').style.display = 'block';
      actualizarListaEquipos();
    }

    function actualizarListaEquipos() {
      let html = "";
      torneo.equipos.forEach((eq, i) => {
        html += `<div class="card">
          <input type="text" value="${eq.nombre}" onchange="renombrarEquipo(${i}, this.value)" style="width:75%;">
          <button onclick="eliminarEquipo(${i})" class="btn-danger">Eliminar</button>
        </div>`;
      });
      document.getElementById('listaEquipos').innerHTML = html;
    }

    function renombrarEquipo(i, nuevo) {
      if (nuevo.trim()) torneo.equipos[i].nombre = nuevo.trim();
      guardar();
    }

    function agregarEquipo() {
      const nombre = document.getElementById('nuevoEquipo').value.trim();
      if (!nombre) return alert("Escribe un nombre");
      torneo.equipos.push({nombre, pj:0, pg:0, pp:0, pf:0, pc:0, puntos:0});
      document.getElementById('nuevoEquipo').value = "";
      actualizarListaEquipos();
      guardar();
    }

    function eliminarEquipo(i) {
      if (confirm("¿Eliminar este equipo?")) {
        torneo.equipos.splice(i, 1);
        actualizarListaEquipos();
        guardar();
      }
    }

    // ==================== FIXTURE MEJORADO (Máximo 1 consecutivo) ====================
    function generarFixture() {
      if (torneo.equipos.length < 2) return alert("Mínimo 2 equipos");

      const equipos = torneo.equipos.map(e => e.nombre);
      torneo.partidos = generarFixtureSinConsecutivos(equipos);

      ocultarTodas();
      document.getElementById('fixture').style.display = 'block';
      mostrarPartidos();
      guardar();
    }

    function generarFixtureSinConsecutivos(equipos) {
      let partidos = [];
      const n = equipos.length;

      for (let i = 0; i < n; i++) {
        for (let j = i + 1; j < n; j++) {
          partidos.push({local: equipos[i], visitante: equipos[j], resultado: null});
          partidos.push({local: equipos[j], visitante: equipos[i], resultado: null});
        }
      }

      let mejorFixture = null;
      let mejorScore = Infinity;

      for (let intento = 0; intento < 2000; intento++) {
        let actual = [...partidos].sort(() => Math.random() - 0.5);
        let score = evaluarFixture(actual, equipos);
        if (score < mejorScore) {
          mejorScore = score;
          mejorFixture = actual;
        }
        if (score === 0) break;
      }

      if (mejorScore > 0) alert("⚠️ No se encontró fixture perfecto. Se usó el mejor posible.");
      else alert("✅ Fixture generado sin partidos consecutivos!");

      return mejorFixture;
    }

    function evaluarFixture(fixture, equipos) {
      let penalizacion = 0;
      let ultimo = {};
      equipos.forEach(eq => ultimo[eq] = -10);

      for (let i = 0; i < fixture.length; i++) {
        const p = fixture[i];
        if (ultimo[p.local] === i-1) penalizacion += 100;
        if (ultimo[p.visitante] === i-1) penalizacion += 100;
        ultimo[p.local] = i;
        ultimo[p.visitante] = i;
      }
      return penalizacion;
    }

    function mostrarPartidos() {
      let html = "";
      torneo.partidos.forEach((p, i) => {
        if (p.resultado) {
          html += `<div class="partido-card">
            <strong>${p.local} vs ${p.visitante}</strong><br>
            <b>${p.resultado.local} - ${p.resultado.visitante}</b>
            <button onclick="editarResultado(${i})" class="btn-primary">Editar</button>
          </div>`;
        } else {
          html += `<div class="partido-card">
            <strong>${p.local} vs ${p.visitante}</strong><br>
            <input type="number" id="L${i}" placeholder="15" style="width:70px"> -
            <input type="number" id="V${i}" placeholder="13" style="width:70px">
            <button onclick="guardarResultado(${i})" class="btn-success">Guardar</button>
          </div>`;
        }
      });
      document.getElementById('listaPartidos').innerHTML = html;
    }

    function guardarResultado(i) {
      const local = parseInt(document.getElementById(`L${i}`).value);
      const visit = parseInt(document.getElementById(`V${i}`).value);
      if (isNaN(local) || isNaN(visit)) return alert("Ingresa ambos marcadores");
      if (Math.abs(local - visit) < 2) return alert("Debe ganar por 2 puntos");

      torneo.partidos[i].resultado = {local, visitante: visit};
      mostrarPartidos();
      guardar();
    }

    function editarResultado(i) {
      if (confirm("¿Editar resultado?")) {
        torneo.partidos[i].resultado = null;
        mostrarPartidos();
        guardar();
      }
    }

    function actualizarEstadisticas() {
      torneo.equipos.forEach(eq => eq.pj = eq.pg = eq.pp = eq.pf = eq.pc = eq.puntos = 0);

      torneo.partidos.forEach(p => {
        if (!p.resultado) return;
        const localTeam = torneo.equipos.find(e => e.nombre === p.local);
        const visitTeam = torneo.equipos.find(e => e.nombre === p.visitante);

        localTeam.pj++; visitTeam.pj++;
        localTeam.pf += p.resultado.local; localTeam.pc += p.resultado.visitante;
        visitTeam.pf += p.resultado.visitante; visitTeam.pc += p.resultado.local;

        if (p.resultado.local > p.resultado.visitante) {
          localTeam.pg++; localTeam.puntos += 3; visitTeam.pp++;
        } else {
          visitTeam.pg++; visitTeam.puntos += 3; localTeam.pp++;
        }
      });
    }

    function mostrarTablaPosiciones() {
      actualizarEstadisticas();
      const sorted = [...torneo.equipos].sort((a,b) => b.puntos - a.puntos || (b.pf-b.pc)-(a.pf-a.pc));

      let html = "";
      sorted.forEach((eq, i) => {
        html += `<tr>
          <td>${i+1}</td>
          <td>${eq.nombre}</td>
          <td>${eq.pj}</td>
          <td>${eq.pg}</td>
          <td>${eq.pp}</td>
          <td>${eq.pf}</td>
          <td>${eq.pc}</td>
          <td>${eq.pf - eq.pc}</td>
          <td><strong>${eq.puntos}</strong></td>
        </tr>`;
      });
      document.getElementById('bodyTabla').innerHTML = html;
      ocultarTodas();
      document.getElementById('tablaPosiciones').style.display = 'block';
    }

    function volverAFixture() {
      ocultarTodas();
      document.getElementById('fixture').style.display = 'block';
      mostrarPartidos();
    }

    function mostrarCargarTorneo() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
          torneo = JSON.parse(ev.target.result);
          guardar();
          ocultarTodas();
          document.getElementById('fixture').style.display = 'block';
          mostrarPartidos();
        };
        reader.readAsText(e.target.files[0]);
      };
      input.click();
    }

    function exportarTorneo() {
      const data = JSON.stringify(torneo, null, 2);
      const blob = new Blob([data], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (torneo.nombre || "torneo_wally") + ".json";
      a.click();
    }

    function reiniciarTodo() {
      if (confirm("¿Borrar todo el torneo?")) location.reload();
    }
  </script>
</body>
</html>
