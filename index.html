<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏆 Retos y Campeonatos Amix - Wally</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-30px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3), 0 4px 15px rgba(0,0,0,0.4); }
      50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.6), 0 4px 15px rgba(0,0,0,0.4); }
    }
    
    @keyframes shimmer {
      0% { background-position: -1000px 0; }
      100% { background-position: 1000px 0; }
    }
    
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-image: url('https://i.imgur.com/7Q8Z9kJ.png');
      background-size: cover;
      background-attachment: fixed;
      background-repeat: no-repeat;
      background-position: center;
      color: #e2e8f0;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.3);
      pointer-events: none;
      z-index: 1;
    }
    
    header {
      background: linear-gradient(135deg, rgba(30, 64, 175, 0.95), rgba(59, 130, 246, 0.95));
      padding: 30px 20px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(59, 130, 246, 0.4);
      animation: slideInLeft 0.8s ease-out;
      position: relative;
      z-index: 2;
      border-bottom: 3px solid #fbbf24;
    }
    
    header h1 {
      font-size: 2.5em;
      text-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
      animation: pulse 3s ease-in-out infinite;
      margin-bottom: 10px;
    }
    
    header h2 {
      font-size: 1.3em;
      color: #fbbf24;
      text-shadow: 0 0 10px rgba(251, 191, 36, 0.4);
    }
    
    .container { 
      max-width: 1100px; 
      margin: 20px auto; 
      padding: 0 15px;
      position: relative;
      z-index: 2;
    }
    
    .card {
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.95));
      border-radius: 16px;
      padding: 25px;
      margin: 15px 0;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      animation: fadeIn 0.6s ease-out;
      border: 2px solid rgba(59, 130, 246, 0.2);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }
    
    .card:hover {
      animation: glow 2s ease-in-out infinite;
      border-color: rgba(59, 130, 246, 0.5);
      transform: translateY(-5px);
    }
    
    button {
      padding: 14px 20px;
      margin: 6px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }
    
    button:active::before {
      width: 300px;
      height: 300px;
    }
    
    button:hover { 
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }
    
    .btn-primary { 
      background: linear-gradient(135deg, #3b82f6, #1e40af);
      color: white;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }
    
    .btn-primary:hover { 
      background: linear-gradient(135deg, #1e40af, #1e3a8a);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
    }
    
    .btn-success { 
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
    }
    
    .btn-success:hover { 
      background: linear-gradient(135deg, #16a34a, #15803d);
      box-shadow: 0 6px 20px rgba(34, 197, 94, 0.6);
    }
    
    .btn-danger { 
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
    }
    
    .btn-danger:hover { 
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      box-shadow: 0 6px 20px rgba(239, 68, 68, 0.6);
    }

    table { 
      width: 100%; 
      border-collapse: collapse; 
      margin-top: 10px;
      animation: fadeIn 0.8s ease-out;
    }
    
    th, td { 
      padding: 14px; 
      text-align: center; 
      border-bottom: 1px solid #334155;
      transition: all 0.3s ease;
    }
    
    th { 
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      font-weight: bold;
      text-shadow: 0 0 10px rgba(251, 191, 36, 0.2);
    }
    
    td:first-child { text-align: left; padding-left: 20px; }
    
    tr:hover { 
      background: rgba(59, 130, 246, 0.2);
      transform: scale(1.02);
    }
    
    input[type="text"], input[type="number"] { 
      padding: 10px; 
      border-radius: 6px; 
      border: 2px solid #475569;
      background: rgba(15, 23, 42, 0.8);
      color: #e2e8f0;
      font-size: 14px;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
    
    input[type="text"]:focus, input[type="number"]:focus {
      outline: none;
      border-color: #3b82f6;
      background: rgba(30, 41, 59, 0.9);
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
    }
    
    .partido-card {
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(30, 41, 59, 0.9));
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      border: 2px solid rgba(59, 130, 246, 0.2);
      animation: slideInLeft 0.5s ease-out;
      transition: all 0.3s ease;
    }
    
    .partido-card:hover {
      border-color: rgba(59, 130, 246, 0.5);
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
      transform: translateX(10px);
    }
    
    .partido-resultado {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      padding: 10px 15px;
      border-radius: 6px;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
      animation: pulse 2s ease-in-out infinite;
    }
    
    ul { list-style: none; margin: 15px 0; }
    
    li { 
      padding: 10px; 
      margin: 8px 0; 
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.8), rgba(30, 41, 59, 0.8));
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid rgba(59, 130, 246, 0.2);
      animation: fadeIn 0.5s ease-out;
      transition: all 0.3s ease;
    }
    
    li:hover {
      border-color: rgba(59, 130, 246, 0.5);
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
    }
    
    .jornada-titulo {
      background: linear-gradient(135deg, rgba(30, 64, 175, 0.9), rgba(59, 130, 246, 0.9));
      padding: 12px;
      margin: 20px 0 10px 0;
      border-radius: 6px;
      font-weight: bold;
      font-size: 16px;
      text-shadow: 0 0 10px rgba(251, 191, 36, 0.4);
      animation: fadeIn 0.6s ease-out;
      border-left: 4px solid #fbbf24;
    }
    
    h2 {
      color: #fbbf24;
      text-shadow: 0 0 10px rgba(251, 191, 36, 0.3);
      animation: fadeIn 0.6s ease-out;
    }
  </style>
</head>
<body>
  <header>
    <h1>🏆 Retos y Campeonatos Amix</h1>
    <h2>Wally Edition</h2>
  </header>

  <div class="container">
    <div id="menu" class="card">
      <h2>Menú Principal</h2>
      <button class="btn-primary" onclick="mostrarCrearTorneo()">➕ Nuevo Torneo</button><br><br>
      <button class="btn-primary" onclick="mostrarCargarTorneo()">📂 Cargar Torneo</button><br><br>
      <button onclick="exportarTorneo()" class="btn-primary">📤 Exportar</button>
      <button onclick="reiniciarTodo()" class="btn-danger">🗑️ Reiniciar</button>
    </div>

    <div id="crearTorneo" class="card" style="display:none;">
      <h2>🏆 Nuevo Torneo</h2>
      <input type="text" id="nombreTorneo" placeholder="Nombre del Torneo" style="width:100%; padding:15px; margin:10px 0; font-size:16px;">
      <label>Número de equipos:</label>
      <input type="number" id="numEquipos" value="5" min="2" max="16" style="width:100%; padding:15px; font-size:16px; margin:10px 0;">
      <button class="btn-success" onclick="crearTorneo()" style="width:100%;">Crear Torneo</button>
      <button onclick="volverMenu()" class="btn-danger" style="width:100%; margin-top:10px;">Cancelar</button>
    </div>

    <div id="gestionEquipos" class="card" style="display:none;">
      <h2>⚽ Gestión de Equipos</h2>
      <p id="contadorEquipos"></p>
      <div id="listaEquipos"></div>
      <input type="text" id="nuevoEquipo" placeholder="Nombre del equipo" style="width:70%; padding:12px; margin:10px 0;">
      <button onclick="agregarEquipo()" class="btn-primary" style="width:28%;">+ Agregar</button>
      <button onclick="generarFixture()" class="btn-success" style="width:100%; margin-top:10px;">✅ Generar Fixture (Mezclado)</button>
      <button onclick="volverMenu()" class="btn-danger" style="width:100%; margin-top:10px;">Atrás</button>
    </div>

    <div id="fixture" class="card" style="display:none;">
      <h2>📋 Fixture</h2>
      <button onclick="mostrarTablaPosiciones()" class="btn-primary">Ver Tabla de Posiciones</button>
      <button onclick="volverMenu()" class="btn-danger">Atrás</button>
      <div id="listaPartidos"></div>
    </div>

    <div id="tablaPosiciones" class="card" style="display:none;">
      <h2>🏅 Tabla de Posiciones</h2>
      <button onclick="volverAFixture()" class="btn-primary">Volver al Fixture</button>
      <table id="tablaPos">
        <thead>
          <tr>
            <th>Pos</th><th>Equipo</th><th>PJ</th><th>PG</th><th>PP</th><th>PF</th><th>PC</th><th>Dif</th><th>Puntos</th>
          </tr>
        </thead>
        <tbody id="bodyTabla"></tbody>
      </table>
    </div>
  </div>

  <script>
    let torneo = { nombre: "", equipos: [], partidos: [] };

    window.onload = () => {
      const saved = localStorage.getItem('torneoWally');
      if (saved) {
        try {
          torneo = JSON.parse(saved);
        } catch(e) {
          console.error("Error al cargar torneo guardado", e);
        }
      }
    };

    function guardar() { 
      localStorage.setItem('torneoWally', JSON.stringify(torneo)); 
    }

    function ocultarTodasPantallas() {
      document.getElementById('menu').style.display = 'none';
      document.getElementById('crearTorneo').style.display = 'none';
      document.getElementById('gestionEquipos').style.display = 'none';
      document.getElementById('fixture').style.display = 'none';
      document.getElementById('tablaPosiciones').style.display = 'none';
    }

    function mostrarCrearTorneo() {
      ocultarTodasPantallas();
      document.getElementById('crearTorneo').style.display = 'block';
      document.getElementById('nombreTorneo').value = '';
      document.getElementById('numEquipos').value = 5;
    }

    function volverMenu() {
      ocultarTodasPantallas();
      document.getElementById('menu').style.display = 'block';
    }

    function crearTorneo() {
      const nombre = document.getElementById('nombreTorneo').value.trim();
      const numEquipos = parseInt(document.getElementById('numEquipos').value);
      
      if (!nombre) {
        alert("❌ Escribe el nombre del torneo");
        return;
      }
      if (isNaN(numEquipos) || numEquipos < 2 || numEquipos > 16) {
        alert("❌ El número de equipos debe estar entre 2 y 16");
        return;
      }

      torneo = { nombre, equipos: [], partidos: [] };
      
      for (let i = 0; i < numEquipos; i++) {
        torneo.equipos.push({nombre: `Equipo ${i+1}`, pj:0, pg:0, pp:0, pf:0, pc:0, puntos:0});
      }
      
      guardar();
      ocultarTodasPantallas();
      document.getElementById('gestionEquipos').style.display = 'block';
      actualizarListaEquipos();
    }

    function actualizarListaEquipos() {
      let html = `<ul>`;
      torneo.equipos.forEach((eq, i) => {
        html += `<li>
          <input type="text" value="${eq.nombre}" style="width:70%; padding:8px;" onchange="renombrarEquipo(${i}, this.value)">
          <button onclick="eliminarEquipo(${i})" class="btn-danger" style="margin:0; padding:10px 15px;">✕ Eliminar</button>
        </li>`;
      });
      html += "</ul>";
      document.getElementById('listaEquipos').innerHTML = html;
      document.getElementById('contadorEquipos').textContent = `${torneo.equipos.length} equipos agregados`;
    }

    function renombrarEquipo(i, nuevoNombre) {
      if (nuevoNombre.trim()) {
        torneo.equipos[i].nombre = nuevoNombre.trim();
        guardar();
      }
    }

    function agregarEquipo() {
      const nombre = document.getElementById('nuevoEquipo').value.trim();
      if (!nombre) {
        alert("❌ Escribe el nombre del equipo");
        return;
      }
      if (torneo.equipos.some(e => e.nombre.toLowerCase() === nombre.toLowerCase())) {
        alert("❌ Este equipo ya existe");
        return;
      }
      torneo.equipos.push({nombre, pj:0, pg:0, pp:0, pf:0, pc:0, puntos:0});
      document.getElementById('nuevoEquipo').value = "";
      actualizarListaEquipos();
      guardar();
    }

    function eliminarEquipo(i) {
      if (confirm(`¿Eliminar ${torneo.equipos[i].nombre}?`)) {
        torneo.equipos.splice(i, 1);
        actualizarListaEquipos();
        guardar();
      }
    }

    function generarFixture() {
      if (torneo.equipos.length < 2) {
        alert("❌ Mínimo 2 equipos para generar fixture");
        return;
      }
      
      let partidosPosibles = [];
      const eq = torneo.equipos;
      
      for (let i = 0; i < eq.length; i++) {
        for (let j = 0; j < eq.length; j++) {
          if (i !== j) {
            partidosPosibles.push({local: eq[i].nombre, visitante: eq[j].nombre, resultado: null});
          }
        }
      }
      
      torneo.partidos = organizarFixtureMezclado(partidosPosibles);
      
      guardar();
      ocultarTodasPantallas();
      document.getElementById('fixture').style.display = 'block';
      mostrarPartidos();
    }

    function organizarFixtureMezclado(partidos) {
      let fixtureOrdenado = [];
      let equiposUltimosPartidos = {};
      
      torneo.equipos.forEach(eq => {
        equiposUltimosPartidos[eq.nombre] = [];
      });
      
      let partidosRestantes = [...partidos];
      let intentos = 0;
      const maxIntentos = 10000;
      
      while (partidosRestantes.length > 0 && intentos < maxIntentos) {
        intentos++;
        let encontrado = false;
        
        for (let i = 0; i < partidosRestantes.length; i++) {
          const partido = partidosRestantes[i];
          const local = partido.local;
          const visitante = partido.visitante;
          
          const localUltimos = equiposUltimosPartidos[local];
          const visitanteUltimos = equiposUltimosPartidos[visitante];
          
          let localSeguidas = 0;
          let visitanteSeguidas = 0;
          
          if (localUltimos.length > 0 && localUltimos[localUltimos.length - 1] === fixtureOrdenado.length) {
            localSeguidas = localUltimos.length;
          }
          
          if (visitanteUltimos.length > 0 && visitanteUltimos[visitanteUltimos.length - 1] === fixtureOrdenado.length) {
            visitanteSeguidas = visitanteUltimos.length;
          }
          
          if (localSeguidas < 2 && visitanteSeguidas < 2) {
            fixtureOrdenado.push(partido);
            
            localUltimos.push(fixtureOrdenado.length - 1);
            visitanteUltimos.push(fixtureOrdenado.length - 1);
            
            if (localUltimos.length > 2) localUltimos.shift();
            if (visitanteUltimos.length > 2) visitanteUltimos.shift();
            
            partidosRestantes.splice(i, 1);
            encontrado = true;
            break;
          }
        }
        
        if (!encontrado && partidosRestantes.length > 0) {
          for (let i = partidosRestantes.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [partidosRestantes[i], partidosRestantes[j]] = [partidosRestantes[j], partidosRestantes[i]];
          }
        }
      }
      
      if (partidosRestantes.length > 0) {
        alert("⚠️ No se pudo organizar un fixture válido después de varios intentos. Se mostrarán los partidos en orden aleatorio.");
        return fixtureOrdenado.concat(partidosRestantes);
      }
      
      return fixtureOrdenado;
    }

    function mostrarPartidos() {
      let html = "";
      let jornadaActual = 1;
      
      torneo.partidos.forEach((p, i) => {
        if (i === 0 || (i > 0 && hayEquipoQueNoJuegaEnJornada(i))) {
          html += `<div class="jornada-titulo">📅 Jornada ${jornadaActual}</div>`;
          jornadaActual++;
        }
        
        if (p.resultado) {
          const local = p.resultado.local;
          const visitante = p.resultado.visitante;
          const resultado = local > visitante ? "🔵" : (local < visitante ? "🔴" : "⚪");
          html += `<div class="partido-card">
            <strong>${p.local} vs ${p.visitante}</strong>
            <span class="partido-resultado">${local} - ${visitante} ${resultado}</span>
            <button onclick="editarResultado(${i})" class="btn-primary" style="margin:0; padding:10px 15px;">Editar</button>
          </div>`;
        } else {
          html += `<div class="partido-card">
            <strong>${p.local} vs ${p.visitante}</strong>
            <div style="display:flex; gap:5px; align-items:center;">
              <input type="number" id="L${i}" placeholder="Goles" min="0" style="width:60px;">
              <span>-</span>
              <input type="number" id="V${i}" placeholder="Goles" min="0" style="width:60px;">
              <button onclick="guardarResultado(${i})" class="btn-success" style="margin:0; padding:10px 15px;">✓ Guardar</button>
            </div>
          </div>`;
        }
      });
      document.getElementById('listaPartidos').innerHTML = html;
    }

    function hayEquipoQueNoJuegaEnJornada(indicePartido) {
      let equiposDiferentes = new Set();
      let i = indicePartido - 1;
      
      while (i >= 0) {
        equiposDiferentes.add(torneo.partidos[i].local);
        equiposDiferentes.add(torneo.partidos[i].visitante);
        
        if (equiposDiferentes.size === torneo.equipos.length) {
          return true;
        }
        
        i--;
      }
      
      return false;
    }

    function guardarResultado(i) {
      const local = parseInt(document.getElementById(`L${i}`).value);
      const visit = parseInt(document.getElementById(`V${i}`).value);
      
      if (isNaN(local) || isNaN(visit) || local < 0 || visit < 0) {
        alert("❌ Ingresa números válidos para ambos marcadores");
        return;
      }
      if (Math.abs(local - visit) < 2) {
        alert("❌ Debe ganar por 2 puntos o más");
        return;
      }

      torneo.partidos[i].resultado = {local, visitante: visit};
      actualizarEstadisticas();
      mostrarPartidos();
      guardar();
    }

    function editarResultado(i) {
      if (confirm("¿Editar este resultado?")) {
        torneo.partidos[i].resultado = null;
        mostrarPartidos();
        guardar();
      }
    }

    function actualizarEstadisticas() {
      torneo.equipos.forEach(eq => {
        eq.pj = 0;
        eq.pg = 0;
        eq.pp = 0;
        eq.pf = 0;
        eq.pc = 0;
        eq.puntos = 0;
      });

      torneo.partidos.forEach(p => {
        if (p.resultado) {
          const local = torneo.equipos.find(e => e.nombre === p.local);
          const visitante = torneo.equipos.find(e => e.nombre === p.visitante);

          if (local && visitante) {
            local.pj++;
            local.pf += p.resultado.local;
            local.pc += p.resultado.visitante;

            visitante.pj++;
            visitante.pf += p.resultado.visitante;
            visitante.pc += p.resultado.local;

            if (p.resultado.local > p.resultado.visitante) {
              local.pg++;
              local.puntos += 3;
              visitante.pp++;
            } else {
              visitante.pg++;
              visitante.puntos += 3;
              local.pp++;
            }
          }
        }
      });
    }

    function mostrarTablaPosiciones() {
      actualizarEstadisticas();
      
      const tablaSorted = [...torneo.equipos].sort((a, b) => {
        if (b.puntos !== a.puntos) return b.puntos - a.puntos;
        return (b.pf - b.pc) - (a.pf - a.pc);
      });

      let html = "";
      tablaSorted.forEach((eq, i) => {
        const dif = eq.pf - eq.pc;
        html += `<tr>
          <td>${i + 1}</td>
          <td>${eq.nombre}</td>
          <td>${eq.pj}</td>
          <td>${eq.pg}</td>
          <td>${eq.pp}</td>
          <td>${eq.pf}</td>
          <td>${eq.pc}</td>
          <td>${dif > 0 ? '+' : ''}${dif}</td>
          <td><strong>${eq.puntos}</strong></td>
        </tr>`;
      });

      document.getElementById('bodyTabla').innerHTML = html;
      ocultarTodasPantallas();
      document.getElementById('tablaPosiciones').style.display = 'block';
    }

    function volverAFixture() {
      ocultarTodasPantallas();
      document.getElementById('fixture').style.display = 'block';
    }

    function mostrarCargarTorneo() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = ev => {
          try {
            torneo = JSON.parse(ev.target.result);
            guardar();
            ocultarTodasPantallas();
            document.getElementById('fixture').style.display = 'block';
            mostrarPartidos();
            alert("✅ Torneo cargado correctamente");
          } catch(error) {
            alert("❌ Error al cargar el archivo. Asegúrate de que sea un JSON válido");
          }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    function exportarTorneo() {
      if (torneo.equipos.length === 0) {
        alert("❌ No hay torneo para exportar");
        return;
      }
      const data = JSON.stringify(torneo, null, 2);
      const blob = new Blob([data], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (torneo.nombre || "torneo") + ".json";
      a.click();
      URL.revokeObjectURL(url);
    }

    function reiniciarTodo() {
      if (confirm("⚠️ ¿Borrar TODO? Esta acción no se puede deshacer")) {
        localStorage.removeItem('torneoWally');
        torneo = { nombre: "", equipos: [], partidos: [] };
        location.reload();
      }
    }
  </script>
</body>
</html>
